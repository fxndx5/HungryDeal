name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  test:
    name: Type check + Tests + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci --legacy-peer-deps

      - name: Type check
        working-directory: frontend/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend/web
        env:
          NEXT_PUBLIC_API_URL: https://hungrydeal-api.onrender.com
        run: npm run build
